{% extends "base.html" %}
{% block title %}注册 - MiniForum{% endblock %}
{% block body %}
<div class="card" style="max-width:500px;margin:40px auto">
  <h2 style="font-size:20px;font-weight:700;margin-bottom:20px;text-align:center">注册账号</h2>
  <form method="POST">
    <div class="form-group">
      <label>用户名 <span style="color:#dc2626">*</span></label>
      <input type="text" name="username" placeholder="设置显示名称" required minlength="2" maxlength="30">
    </div>
    <div class="form-group">
      <label>密码 <span style="color:#dc2626">*</span></label>
      <input type="password" name="password" placeholder="设置登录密码" required minlength="6">
    </div>
    <div class="form-group">
      <label>确认密码 <span style="color:#dc2626">*</span></label>
      <input type="password" name="password2" placeholder="再次输入密码" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>QQ号（可选）</label>
        <input type="text" name="qq" placeholder="用于QQ号登录">
      </div>
      <div class="form-group">
        <label>邮箱（可选）</label>
        <input type="email" name="email" placeholder="用于邮箱登录">
      </div>
    </div>
    <p style="font-size:12px;color:#6b7280;margin-bottom:16px">
      💡 至少填写 QQ号 或 邮箱之一，不填则只能用用户名登录
    </p>
    <button type="submit" class="btn" style="width:100%">注册</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:14px;color:#6b7280">
    已有账号？<a href="{{ url_for('login') }}">直接登录</a>
  </p>
</div>
{% endblock %}
