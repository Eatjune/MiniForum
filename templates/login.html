{% extends "base.html" %}
{% block title %}登录 - MiniForum{% endblock %}
{% block body %}
<div class="card" style="max-width:440px;margin:40px auto">
  <h2 style="font-size:20px;font-weight:700;margin-bottom:20px;text-align:center">登录</h2>
  <form method="POST">
    <div class="form-group">
      <label>QQ号 / 邮箱 / 用户名</label>
      <input type="text" name="identifier" placeholder="输入QQ号、邮箱或用户名" required autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" placeholder="输入密码" required>
    </div>
    <button type="submit" class="btn" style="width:100%">登录</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:14px;color:#6b7280">
    还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
  </p>
</div>
{% endblock %}
