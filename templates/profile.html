{% extends "base.html" %}
{% block title %}个人中心 - MiniForum{% endblock %}
{% block body %}
<style>
.tab-btn{padding:8px 20px;border:1px solid #d1d5db;background:#fff;border-radius:6px 0 0 6px;cursor:pointer;font-size:14px}
.tab-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.tab-btn2{border-radius:0 6px 6px 0;margin-left:-1px}
.tab-panel{display:none}
.tab-panel.active{display:block}
</style>
<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
  <h2 style="font-size:20px;font-weight:700">个人中心</h2>
  <span style="color:#6b7280;font-size:14px">👤 {{ user.username }}{% if user.is_admin %} <span class="badge badge-admin">管理员</span>{% endif %}</span>
</div>

<div style="margin-bottom:16px">
  <button class="tab-btn active" onclick="showTab('info')" id="btn-info">个人信息</button>
  <button class="tab-btn tab-btn2" onclick="showTab('password')" id="btn-password">修改密码</button>
</div>

<div id="panel-info" class="tab-panel active">
  <div class="card">
    <form method="POST">
      <input type="hidden" name="action" value="update_info">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" value="{{ user.username }}" disabled style="background:#f3f4f6">
        <div style="font-size:12px;color:#9ca3af;margin-top:4px">用户名不可修改</div>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" name="email" value="{{ user.email or '' }}" placeholder="选填">
      </div>
      <div class="form-group">
        <label>QQ号</label>
        <input type="text" name="qq" value="{{ user.qq or '' }}" placeholder="选填">
      </div>
      <div class="form-group">
        <label>注册时间</label>
        <input type="text" value="{{ user.created_at | date('%Y-%m-%d') }}" disabled style="background:#f3f4f6">
      </div>
      <button type="submit" class="btn">保存修改</button>
    </form>
  </div>
</div>

<div id="panel-password" class="tab-panel">
  <div class="card">
    <form method="POST">
      <input type="hidden" name="action" value="change_password">
      <div class="form-group">
        <label>原密码</label>
        <input type="password" name="old_password" required placeholder="请输入当前密码">
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" name="new_password" required minlength="6" placeholder="至少6位">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" name="new_password2" required minlength="6" placeholder="再输入一次">
      </div>
      <button type="submit" class="btn">修改密码</button>
    </form>
  </div>
</div>

<script>
function showTab(name){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('btn-'+name).classList.add('active');
}
</script>
{% endblock %}
